name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # NTS builds (setup-php provides no ZTS). The thread-safe SAPI that
        # production runs on (FrankenPHP/ZTS) is covered by the zts job below;
        # the engine is SAPI-agnostic and detects ZTS at runtime (ZEND_THREAD_SAFE).
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, sodium
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Lint engine
        run: |
          for f in phlo.php functions.php error.php debug.php preload.php control.php functions.trace.php classes/*.php; do
            php -l "$f"
          done

      - name: Run tests
        run: vendor/bin/phpunit

  mysql:
    name: MySQL parity
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: phlo_test
          MYSQL_USER: phlo
          MYSQL_PASSWORD: phlo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, sodium
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      # The same ORM/audit probes DbTest runs on SQLite, but against a real MySQL: CRUD + the
      # driver-specific INSERT IGNORE, a custom string primary key, relation loading, and the audit
      # transaction + savepoint rollback. The fixture switches engine on PHLO_TEST_DB=mysql.
      - name: Run the MySQL parity suite
        env:
          PHLO_TEST_DB: mysql
          PHLO__mysql__host: 127.0.0.1
          PHLO__mysql__database: phlo_test
          PHLO__mysql__user: phlo
          PHLO__mysql__password: phlo
        run: vendor/bin/phpunit --filter MySqlTest

  pgsql:
    name: PostgreSQL parity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: phlo_test
          POSTGRES_USER: phlo
          POSTGRES_PASSWORD: phlo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U phlo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, sodium
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      # The same ORM/audit probes DbTest runs on SQLite, but against a real PostgreSQL: CRUD + the
      # ON CONFLICT DO NOTHING insert-ignore, a custom string primary key (its insert touches no
      # sequence, so lastId() guards the lastval() call with a SAVEPOINT), relation loading, and the
      # audit transaction + savepoint rollback with a quoted reserved "user" column. The fixture
      # switches engine on PHLO_TEST_DB=pgsql.
      - name: Run the PostgreSQL parity suite
        env:
          PHLO_TEST_DB: pgsql
          PHLO__postgresql__host: 127.0.0.1
          PHLO__postgresql__database: phlo_test
          PHLO__postgresql__user: phlo
          PHLO__postgresql__password: phlo
        run: vendor/bin/phpunit --filter PostgreSqlTest

  zts:
    name: ZTS worker mode (FrankenPHP)
    runs-on: ubuntu-latest
    container: dunglas/frankenphp:1-php8.5
    steps:
      - name: System deps (git/unzip for checkout + composer, pdo_sqlite/sodium, composer)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git unzip
          install-php-extensions pdo_sqlite sodium @composer

      - uses: actions/checkout@v4

      - name: Assert the runtime is thread-safe (ZTS)
        run: php -r 'exit(ZEND_THREAD_SAFE ? 0 : 1);'

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      # The full suite on the thread-safe SAPI production runs on (FrankenPHP/ZTS), which setup-php
      # cannot provide. ServeTest drives the phlo_serve worker loop over many requests here, so the
      # worker lifecycle (per-request reset, state isolation) is proven on ZTS, not only NTS.
      - name: Run the suite on ZTS
        run: vendor/bin/phpunit

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # On a version tag, publish ghcr.io/<owner>/phlo:<version> and :latest.
      # On branches/PRs the image is built but not pushed (smoke test only).
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/phlo
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
