; Phlo connector credentials template.
;
; Copy the sections you need into your app's data/creds.ini and fill in the
; values. Every key is also overridable through environment variables using the
; PHLO__<section>__<key> form, e.g. PHLO__Slack__bot_token=xoxb-...
; (host-scoped: PHLO_<HOST>__Slack__bot_token=...). Values are wrapped in a
; SensitiveParameterValue so they stay out of stack traces and logs.
;
; Section names match each connector's creds section exactly (case-insensitive).

; --- Webshops -------------------------------------------------------------

[Shopify]
shop_domain = your-store.myshopify.com
; api_version = 2024-01
access_token = shpat_xxxxxxxxxxxxxxxxxxxxxxxx

[Lightspeed]
cluster_id = 000000
; language = nl
api_key = xxxxxxxxxxxxxxxxxxxx
api_secret = xxxxxxxxxxxxxxxxxxxx

; --- Messaging / channels -------------------------------------------------

[Slack]
bot_token = xoxb-0000000000-0000000000000-xxxxxxxxxxxxxxxxxxxxxxxx
; signing_secret = xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

[Telegram]
bot_token = 0000000000:XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
; webhook_secret = your-chosen-webhook-secret

[Twilio]
account_sid = ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
from_number = +31600000000
; messaging_service_sid = MGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
auth_token = xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

[MessageBird]
originator = Phlo
access_key = xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

[Resend]
from_email = App <noreply@yourdomain.com>
api_key = re_xxxxxxxxxxxxxxxxxxxxxxxxxxxx

; --- Accounting / finance -------------------------------------------------

[Moneybird]
administration_id = 000000000000000000
access_token = xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

[ExactOnline]
division = 0000000
client_id = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
client_secret = xxxxxxxxxxxxxxxxxxxxxxxx
refresh_token = xxxxxxxxxxxxxxxxxxxxxxxx

; --- Productivity / cloud -------------------------------------------------

[Microsoft]
tenant_id = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
client_id = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
; mailbox = user@yourtenant.onmicrosoft.com
client_secret = xxxxxxxxxxxxxxxxxxxxxxxx

; Google Calendar and Google Sheets share one [Google] section and one stored
; OAuth token. The refresh token must carry both the calendar and spreadsheets
; scopes if you use both connectors.
[Google]
client_id = xxxxxxxxxxxx.apps.googleusercontent.com
client_secret = xxxxxxxxxxxxxxxxxxxxxxxx
refresh_token = 1//xxxxxxxxxxxxxxxxxxxxxxxx
