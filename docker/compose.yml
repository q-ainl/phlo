# Example: run a Phlo app from ./app with the engine image.
# Scaffold the app first:
#   docker compose run --rm phlo php /phlo/install.php /app
services:
  phlo:
    build:
      context: ..
    ports:
      - "${PORT:-80}:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ../app:/app
    environment:
      # Plain HTTP on http://localhost by default. Set SERVER_NAME=localhost for HTTPS
      # on https://localhost (Caddy issues a local certificate), or set a real domain
      # for automatic public HTTPS.
      SERVER_NAME: ${SERVER_NAME:-:80}
    tty: true
