# Example: run a Phlo app from ./app with the engine image.
# Scaffold the app first:
#   docker compose run --rm phlo php /phlo/install.php /app
services:
  phlo:
    build:
      context: ..
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
    volumes:
      - ../app:/app
    environment:
      # Plain HTTP on http://localhost:8080 by default. Set SERVER_NAME=localhost for
      # HTTPS on https://localhost:8443 (Caddy issues a local certificate), or set a
      # real domain and map 80:80/443:443 for automatic public HTTPS.
      SERVER_NAME: ${SERVER_NAME:-:80}
    tty: true
