# Example: run a Phlo app from ./app with the engine image.
# Scaffold the app first:
#   docker compose run --rm phlo php /phlo/install.php /app
services:
  phlo:
    build:
      context: ..
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ../app:/app
    environment:
      # Set to your domain for automatic HTTPS; leave unset for plain HTTP on :80.
      SERVER_NAME: ${SERVER_NAME:-:80}
    tty: true
